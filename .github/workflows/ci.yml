name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:0.8.3-pg17-trixie
        env:
          POSTGRES_USER: jobhunter
          POSTGRES_PASSWORD: jobhunter_dev
          POSTGRES_DB: jobhunter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jobhunter -d jobhunter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_MODE: local
      DATABASE_URL: postgresql+psycopg://jobhunter:jobhunter_dev@localhost:5432/jobhunter
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: nomic-embed-text
      GENERATION_PROVIDER: ollama
      GENERATION_MODEL: qwen3:4b
      OLLAMA_BASE_URL: http://localhost:11434

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run migrations
        run: python -m alembic upgrade head

      - name: Validate migration head
        run: |
          python -m alembic heads
          python -m alembic current

      - name: Run tests
        run: python -m pytest -q

      - name: Validate Docker Compose files
        run: |
          docker compose config
          docker compose -f docker-compose.demo.yml config

      - name: Build Docker images
        run: |
          docker build -f Dockerfile.backend -t ai-job-hunter-crm-backend:ci .
          docker build -f Dockerfile.frontend -t ai-job-hunter-crm-frontend:ci .

      - name: Validate Markdown relative links
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          missing = []
          for path in [Path("README.md"), *Path("docs").glob("*.md"), Path("CHANGELOG.md"), Path("RELEASE_NOTES.md")]:
              if not path.exists():
                  continue
              text = path.read_text(encoding="utf-8")
              for target in re.findall(r"\[[^\]]+\]\(([^)]+)\)", text):
                  if "://" in target or target.startswith("#") or target.startswith("mailto:"):
                      continue
                  clean = target.split("#", 1)[0]
                  if clean and not (path.parent / clean).exists():
                      missing.append(f"{path}: {target}")
          if missing:
              raise SystemExit("Missing Markdown links:\n" + "\n".join(missing))
          PY
